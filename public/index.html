<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Writeup & Research Blog">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Ahrial Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo" onclick="router.navigate('/')">
        <span class="accent">✦</span> Ahrial<span class="accent">blog</span>
      </div>
      <div class="header-right">
        <div class="header-actions" id="headerActions"></div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </main>

  <footer class="site-footer">
    Ahrial<span style="color:var(--primary)">blog</span> — research & writeups
  </footer>

  <div class="modal-overlay" id="loginModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2>Admin Login</h2>
        <button class="modal-close" onclick="closeLoginModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" id="loginUser" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="loginPass" required autocomplete="current-password">
          </div>
          <div class="form-group">
            <div class="cf-turnstile" data-sitekey="" id="turnstileWidget"></div>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%" id="loginBtn">Login</button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="folderModal">
    <div class="modal" style="max-width:460px">
      <div class="modal-header">
        <h2 id="folderModalTitle">New Folder</h2>
        <button class="modal-close" onclick="closeFolderModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="folderForm" onsubmit="handleFolderSubmit(event)">
          <input type="hidden" id="editFolderId" value="">
          <div class="form-group">
            <label class="form-label">CTF Name</label>
            <input class="form-input" type="text" id="folderNameInput" placeholder="UCTF 2026" required>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input class="form-input" type="text" id="folderDescInput" placeholder="Writeups from UCTF 2026">
          </div>
        </form>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" type="button" onclick="closeFolderModal()">Cancel</button>
        <button class="btn btn-primary" type="submit" form="folderForm" id="folderSubmitBtn">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="postModalTitle">New Post</h2>
        <button class="modal-close" onclick="closePostModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="postForm" onsubmit="handlePostSubmit(event)">
          <input type="hidden" id="editPostId" value="">
          <input type="hidden" id="postFolderId" value="">
          <div class="form-group" id="fileUploadGroup">
            <label class="form-label">Markdown File</label>
            <div class="drop-zone" id="dropZone">
              <div class="icon">📄</div>
              <p>Drag & drop a <strong>.md</strong> file here, or click to browse</p>
              <div class="file-name" id="fileName"></div>
            </div>
            <input type="file" id="fileInput" accept=".md,.markdown" style="display:none">
          </div>
          <div class="form-group">
            <div class="tab-bar">
              <button type="button" class="active" onclick="switchTab(this, 'upload')">Upload File</button>
              <button type="button" onclick="switchTab(this, 'write')">Write Directly</button>
            </div>
          </div>
          <div class="form-group" id="editorGroup" style="display:none">
            <label class="form-label">Content (Markdown)</label>
            <textarea class="form-textarea" id="contentInput" rows="10" placeholder="# My Writeup&#10;&#10;Write your content here..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Title <span style="color:var(--text-muted)">(auto-detected from heading)</span></label>
            <input class="form-input" type="text" id="titleInput" placeholder="Post title">
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input class="form-input" type="text" id="descInput" placeholder="Brief description">
          </div>
          <div class="form-group">
            <label class="form-label">Tags</label>
            <input class="form-input" type="text" id="tagsInput" placeholder="web, pwn, crypto, reverse">
            <div class="form-hint">Comma-separated</div>
          </div>
        </form>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" type="button" onclick="closePostModal()">Cancel</button>
        <button class="btn btn-primary" type="submit" form="postForm" id="postSubmitBtn">Publish</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editContentModal">
    <div class="modal" style="max-width:700px">
      <div class="modal-header">
        <h2>Edit Content</h2>
        <button class="modal-close" onclick="closeEditContentModal()">&times;</button>
      </div>
      <div class="modal-body">
        <textarea class="form-textarea" id="editContentArea" rows="20" style="min-height:400px"></textarea>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="closeEditContentModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditContent()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
</body>
</html>
